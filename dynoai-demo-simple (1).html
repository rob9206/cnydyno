<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DynoAI Interactive Demo</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: white;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { font-size: 36px; text-align: center; margin-bottom: 10px; 
             background: linear-gradient(135deg, #3b82f6, #8b5cf6);
             -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { text-align: center; color: #888; margin-bottom: 40px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .tab { padding: 12px 20px; background: #222; border: none; color: #888;
               cursor: pointer; border-radius: 8px; font-size: 14px; font-weight: 600; }
        .tab.active { background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; }
        .card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px;
                padding: 30px; margin-bottom: 20px; }
        .title { font-size: 24px; margin-bottom: 20px; font-weight: bold;
                 background: linear-gradient(135deg, #3b82f6, #8b5cf6);
                 -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .grid { display: grid; gap: 20px; }
        .grid-2 { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
        .btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #3b82f6, #8b5cf6);
               border: none; color: white; border-radius: 8px; cursor: pointer;
               font-size: 16px; font-weight: bold; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn:hover:not(:disabled) { opacity: 0.9; }
        .progress { width: 100%; height: 10px; background: #333; border-radius: 5px;
                    overflow: hidden; margin: 10px 0; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #3b82f6, #8b5cf6);
                        transition: width 0.3s; }
        .metric { text-align: center; padding: 20px; background: #222; border-radius: 8px; }
        .metric-value { font-size: 36px; font-weight: bold;
                        background: linear-gradient(135deg, #3b82f6, #8b5cf6);
                        -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .metric-label { color: #888; margin-top: 5px; font-size: 14px; }
        .alert { padding: 20px; border-radius: 8px; margin-top: 15px; }
        .alert-red { background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; }
        .alert-green { background: rgba(16, 185, 129, 0.1); border: 1px solid #10b981; }
        .slider { width: 100%; margin: 10px 0; }
        input[type="range"] { width: 100%; height: 6px; background: #333; border-radius: 3px;
                              outline: none; -webkit-appearance: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px;
                                                     height: 16px; background: #3b82f6;
                                                     border-radius: 50%; cursor: pointer; }
        p { line-height: 1.6; color: #ccc; margin-bottom: 15px; }
        ul { padding-left: 20px; line-height: 1.8; color: #ccc; }
        .text-gray { color: #888; }
        .text-small { font-size: 14px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [tab, setTab] = useState('basics');

            return (
                <div className="container">
                    <h1>DynoAI Interactive Demo</h1>
                    <p className="subtitle">Learn how AI-powered ECU calibration works</p>
                    
                    <div className="tabs">
                        <button className={tab === 'basics' ? 'tab active' : 'tab'} onClick={() => setTab('basics')}>
                            📚 VE Tuning 101
                        </button>
                        <button className={tab === 'onepull' ? 'tab active' : 'tab'} onClick={() => setTab('onepull')}>
                            ⚡ One-Pull Baseline
                        </button>
                        <button className={tab === 'knock' ? 'tab active' : 'tab'} onClick={() => setTab('knock')}>
                            🔊 Knock Detection
                        </button>
                        <button className={tab === 'compare' ? 'tab active' : 'tab'} onClick={() => setTab('compare')}>
                            📈 Comparison
                        </button>
                    </div>

                    {tab === 'basics' && <Basics />}
                    {tab === 'onepull' && <OnePull />}
                    {tab === 'knock' && <Knock />}
                    {tab === 'compare' && <Compare />}
                </div>
            );
        }

        function Basics() {
            const [rpm, setRpm] = useState(3000);
            const [kpa, setKpa] = useState(70);
            const [afr, setAfr] = useState(14.5);
            const target = 13.2;
            const currentVE = 85;
            const factor = target / afr;
            const newVE = currentVE * factor;

            return (
                <div>
                    <div className="card">
                        <div className="title">What is VE Tuning?</div>
                        <p>
                            When you tune a Harley EFI system, you're telling the ECU how much air the engine 
                            actually breathes at different RPM and throttle positions. This is called <strong>Volumetric Efficiency (VE)</strong>.
                        </p>
                        <p>
                            Your engine has a certain cylinder volume. If it was 100% efficient, it would fill 
                            those cylinders completely. In reality, engines are 70-95% efficient due to restrictions.
                        </p>
                    </div>

                    <div className="card">
                        <div className="title">Interactive VE Calculator</div>
                        <p>Adjust the values to see how VE correction works:</p>
                        
                        <div>
                            <label className="text-small">RPM: <strong>{rpm}</strong></label>
                            <input type="range" min="2000" max="6000" step="500" value={rpm} 
                                   onChange={(e) => setRpm(e.target.value)} className="slider" />
                        </div>

                        <div>
                            <label className="text-small">kPa: <strong>{kpa}</strong></label>
                            <input type="range" min="40" max="100" step="10" value={kpa} 
                                   onChange={(e) => setKpa(e.target.value)} className="slider" />
                        </div>

                        <div>
                            <label className="text-small">Measured AFR: <strong>{afr}</strong></label>
                            <input type="range" min="12.5" max="15.5" step="0.1" value={afr} 
                                   onChange={(e) => setAfr(parseFloat(e.target.value))} className="slider" />
                        </div>

                        <div className="alert alert-green">
                            <h3 style={{marginBottom: '15px', fontSize: '18px'}}>The Math</h3>
                            <p>Current VE: <strong>{currentVE}%</strong></p>
                            <p>Target AFR: <strong>{target}</strong></p>
                            <p>Measured AFR: <strong>{afr}</strong></p>
                            <p>Correction Factor: <strong>{factor.toFixed(3)}</strong></p>
                            <hr style={{margin: '15px 0', border: '1px solid #333'}} />
                            <p style={{fontSize: '20px'}}>New VE = <strong>{newVE.toFixed(1)}%</strong></p>
                            <p className="text-small text-gray" style={{marginTop: '10px'}}>
                                {afr > target ? "Running LEAN - need MORE fuel, INCREASE VE" : "Running RICH - need LESS fuel, DECREASE VE"}
                            </p>
                        </div>
                    </div>

                    <div className="card">
                        <div className="title">The Traditional Problem</div>
                        <div className="alert alert-red">
                            <p><strong>The Iteration Trap:</strong></p>
                            <ol style={{paddingLeft: '20px', marginTop: '10px'}}>
                                <li>Make a pull at one load point</li>
                                <li>Calculate VE correction</li>
                                <li>Flash new tune</li>
                                <li><strong>Repeat 15-20 times</strong></li>
                                <li>Takes 5-6 hours</li>
                            </ol>
                        </div>
                    </div>
                </div>
            );
        }

        function OnePull() {
            const [progress, setProgress] = useState(0);
            const [running, setRunning] = useState(false);
            const [done, setDone] = useState(false);

            const run = () => {
                setRunning(true);
                setDone(false);
                setProgress(0);
                
                let p = 0;
                const interval = setInterval(() => {
                    p += 2;
                    setProgress(p);
                    if (p >= 100) {
                        setRunning(false);
                        setDone(true);
                        clearInterval(interval);
                    }
                }, 50);
            };

            return (
                <div>
                    <div className="card">
                        <div className="title">One-Pull Baseline™</div>
                        <p>
                            DynoAI captures AFR data across the entire RPM range in one WOT pull. Instead of just 
                            correcting tested cells, it uses AI to understand your engine's breathing pattern and 
                            generates the entire VE table.
                        </p>

                        <div className="grid grid-2" style={{marginTop: '20px'}}>
                            <div>
                                <h3 style={{marginBottom: '10px', color: '#ef4444'}}>Traditional</h3>
                                <ul>
                                    <li>15-20 pulls</li>
                                    <li>5-6 hours</li>
                                    <li>Tested cells only</li>
                                </ul>
                            </div>
                            <div>
                                <h3 style={{marginBottom: '10px', color: '#10b981'}}>DynoAI</h3>
                                <ul>
                                    <li>1 WOT + 2-4 refine</li>
                                    <li>2-3 hours</li>
                                    <li>Complete map</li>
                                </ul>
                            </div>
                        </div>

                        <button className="btn" onClick={run} disabled={running} style={{marginTop: '20px'}}>
                            {running ? 'Processing...' : done ? 'Run Again' : 'Run Simulation'}
                        </button>

                        {progress > 0 && (
                            <div style={{marginTop: '20px'}}>
                                <div style={{display: 'flex', justifyContent: 'space-between', marginBottom: '8px'}}>
                                    <span>{progress < 40 ? 'Collecting data...' : progress < 70 ? 'Analyzing...' : progress < 100 ? 'Generating VE table...' : 'Complete!'}</span>
                                    <span>{progress}%</span>
                                </div>
                                <div className="progress">
                                    <div className="progress-bar" style={{width: progress + '%'}}></div>
                                </div>
                            </div>
                        )}

                        {done && (
                            <div className="grid grid-2" style={{marginTop: '20px'}}>
                                <div className="metric">
                                    <div className="metric-value">1</div>
                                    <div className="metric-label">Pull Used</div>
                                </div>
                                <div className="metric">
                                    <div className="metric-value">97.5%</div>
                                    <div className="metric-label">Accuracy</div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function Knock() {
            const [running, setRunning] = useState(false);
            const [detected, setDetected] = useState(false);
            const [rpm, setRpm] = useState(2000);

            const start = () => {
                setDetected(false);
                setRunning(true);
                setRpm(2000);

                const interval = setInterval(() => {
                    setRpm(prev => {
                        const newRpm = prev + 200;
                        if (newRpm > 5500 && Math.random() > 0.7) {
                            setDetected(true);
                            setRunning(false);
                            clearInterval(interval);
                        }
                        return newRpm;
                    });
                }, 100);
            };

            return (
                <div>
                    <div className="card">
                        <div className="title">What is Knock?</div>
                        <p>
                            Knock (detonation) is when the air/fuel mixture ignites before the spark plug fires. 
                            Instead of controlled combustion, you get an explosion that damages pistons and rings.
                        </p>

                        <div className="grid grid-2" style={{marginTop: '20px'}}>
                            <div className="alert alert-green">
                                <strong>Normal Combustion</strong>
                                <ul style={{marginTop: '10px'}}>
                                    <li>Controlled burn</li>
                                    <li>Single flame front</li>
                                    <li>Smooth pressure rise</li>
                                </ul>
                            </div>
                            <div className="alert alert-red">
                                <strong>Detonation</strong>
                                <ul style={{marginTop: '10px'}}>
                                    <li>Uncontrolled explosion</li>
                                    <li>Multiple flame fronts</li>
                                    <li>Damages engine</li>
                                </ul>
                            </div>
                        </div>
                    </div>

                    <div className="card">
                        <div className="title">Live Monitoring</div>
                        <div className="metric" style={{marginBottom: '20px'}}>
                            <div className="metric-value">{rpm}</div>
                            <div className="metric-label">RPM</div>
                        </div>

                        <button className="btn" onClick={start} disabled={running}>
                            {running ? 'Monitoring...' : 'Start Pull'}
                        </button>

                        {detected && (
                            <div className="alert alert-red" style={{marginTop: '20px'}}>
                                <h3 style={{marginBottom: '10px', fontSize: '18px'}}>⚠️ KNOCK DETECTED</h3>
                                <p><strong>Location:</strong> 5,547 RPM @ 95 kPa</p>
                                <p><strong>Action:</strong> Pull aborted</p>
                                <div style={{marginTop: '15px', padding: '15px', background: 'rgba(0,0,0,0.3)', borderRadius: '8px'}}>
                                    <strong>Recommendations:</strong>
                                    <ul style={{marginTop: '8px'}}>
                                        <li>Reduce timing 2-3°</li>
                                        <li>Enrich AFR to 12.8</li>
                                        <li>Check for carbon buildup</li>
                                    </ul>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function Compare() {
            return (
                <div>
                    <div className="card">
                        <div className="title">Traditional vs DynoAI</div>
                        
                        {[
                            {label: 'Dyno Pulls', before: '15-20', after: '3-5'},
                            {label: 'Time', before: '5-6 hrs', after: '2-3 hrs'},
                            {label: 'Coverage', before: '~80%', after: '~98%'},
                            {label: 'Accuracy', before: 'Variable', after: '97.5%'}
                        ].map((m, i) => (
                            <div key={i} style={{marginBottom: '20px', padding: '15px', background: '#222', borderRadius: '8px'}}>
                                <h3 style={{marginBottom: '15px', fontSize: '16px'}}>{m.label}</h3>
                                <div style={{display: 'grid', gridTemplateColumns: '1fr auto 1fr', gap: '20px', alignItems: 'center'}}>
                                    <div style={{textAlign: 'center'}}>
                                        <div style={{fontSize: '12px', color: '#888'}}>Traditional</div>
                                        <div style={{fontSize: '24px', fontWeight: 'bold', color: '#ef4444'}}>{m.before}</div>
                                    </div>
                                    <div style={{fontSize: '24px'}}>→</div>
                                    <div style={{textAlign: 'center'}}>
                                        <div style={{fontSize: '12px', color: '#888'}}>DynoAI</div>
                                        <div style={{fontSize: '24px', fontWeight: 'bold', color: '#10b981'}}>{m.after}</div>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    <div className="card">
                        <div className="title">Bottom Line</div>
                        <div className="grid grid-2">
                            <div className="metric">
                                <div className="metric-value">2-3x</div>
                                <div className="metric-label">More bikes per day</div>
                            </div>
                            <div className="metric">
                                <div className="metric-value">60-70%</div>
                                <div className="metric-label">Time savings</div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
